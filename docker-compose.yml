services:
  crawlyx:
    build: .
    container_name: crawlyx
    ports:
      - "${HOST_BINDING:-127.0.0.1}:${EXTERNAL_PORT:-5000}:5000"
    volumes:
      # Persist crawl history and settings
      - ./data:/app/data
    environment:
      - FLASK_APP=main.py
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: python main.py

    # Increase shared memory size for Chrome to prevent crashes
    shm_size: '2gb'
